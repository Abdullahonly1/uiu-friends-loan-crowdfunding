<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Loan Post</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="dashboard.html">UIU Friends</a>
        <a class="nav-link text-white" href="dashboard.html">Back to Dashboard</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4>Create a new Loan Request</h4>
                </div>
                <div class="card-body">
                    <form id="createLoanForm">
                        <div class="mb-3">
                            <label class="form-label">Amount of money</label>
                            <input type="number" id="amount" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Why do you need money? (details)</label>
                            <textarea id="purpose" class="form-control" rows="4" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">How many months to pay?</label>
                            <input type="number" id="repaymentMonths" class="form-control" min="1" max="36" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Post (For Admin Approval)</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.getElementById("createLoanForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const request = {
            amount: parseFloat(document.getElementById("amount").value),
            purpose: document.getElementById("purpose").value,
            repaymentMonths: parseInt(document.getElementById("repaymentMonths").value)
        };

        try {
            await apiRequest("/loans", "POST", request);
            alert("Loan Post has been created successfully! Admin will publish if approved.");
            window.location.href = "loan-posts.html";
        } catch (error) {
            alert("Error: " + error.message);
        }
    });
</script>
</body>
</html>
