<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - UIU Friends</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        .chat-item { cursor: pointer; padding: 15px; border-radius: 8px; }
        .chat-item:hover { background: #f8f9fa; }
        .message-box { height: 65vh; overflow-y: auto; background: #f8f9fa; padding: 15px; border-radius: 10px; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold fs-3 text-primary" href="dashboard.html">UIU Friends</a>
        <a href="dashboard.html" class="btn btn-outline-secondary"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    </div>
</nav>

<div class="container mt-4">
    <h3 class="mb-4">💬 My Messages</h3>

    <div class="row">
        <div class="col-md-4">
            <div class="card">
                <div class="card-header bg-light"><strong>My Conversations</strong></div>
                <div class="list-group list-group-flush" id="conversationsList"></div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card">
                <div class="card-header" id="chatHeader">Chat</div>
                <div class="card-body message-box" id="chatBody"></div>
                <div class="card-footer">
                    <div class="input-group">
                        <input type="text" id="chatInput" class="form-control" placeholder="Type your message..." onkeypress="if(event.key==='Enter') sendChatMessage()">
                        <button class="btn btn-primary" onclick="sendChatMessage()">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
    let currentUser = {};
    let currentChatReceiver = null;

    async function loadUserInfo() {
        const token = localStorage.getItem('token');
        if (!token) return window.location.href = 'login.html';
        try {
            const res = await fetch('/api/auth/me', { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.ok) currentUser = await res.json();
            console.log("✅ Logged in as:", currentUser.name, "ID:", currentUser.id);
        } catch (e) { console.error(e); }
    }

    async function loadConversations() {
        const container = document.getElementById("conversationsList");
        container.innerHTML = `<div class="text-center py-4 text-muted">Loading...</div>`;

        try {
            const conversations = await apiRequest('/messages/conversations', "GET");
            container.innerHTML = "";

            if (conversations.length === 0) {
                container.innerHTML = `<div class="text-center py-5 text-muted">No conversations yet</div>`;
                return;
            }

            conversations.forEach(conv => {
                container.innerHTML += `
                    <div class="list-group-item chat-item p-3" onclick="openChat(${conv.userId}, '${conv.name}')">
                        <strong>${conv.name}</strong><br>
                        <small class="text-muted">${conv.lastMessage || 'No messages'}</small>
                    </div>`;
            });
        } catch (e) {
            console.error(e);
            container.innerHTML = `<div class="text-center py-5 text-muted">Failed to load</div>`;
        }
    }

    function openChat(receiverId, name) {
        currentChatReceiver = receiverId;
        document.getElementById("chatHeader").innerHTML = `<strong>Chat with ${name}</strong>`;
        loadChatHistory();
    }

    async function loadChatHistory() {
        if (!currentChatReceiver) return;

        const chatBody = document.getElementById("chatBody");
        chatBody.innerHTML = "<p class='text-center text-muted py-5'>Loading messages...</p>";

        try {
            const res = await apiRequest(`/messages/history/${currentChatReceiver}`, "GET");
            console.log("📊 History Response for receiver", currentChatReceiver, ":", res);

            chatBody.innerHTML = "";

            if (!res || res.length === 0) {
                chatBody.innerHTML = `<p class='text-center text-muted py-5'>No messages yet.<br>Send the first message!</p>`;
                return;
            }

            res.forEach(msg => {
                const isMine = msg.sender.id === currentUser.id;
                chatBody.innerHTML += `
                    <div class="mb-3 ${isMine ? 'text-end' : 'text-start'}">
                        <small class="text-muted">${isMine ? 'You' : (msg.sender.name || '')}</small><br>
                        <span class="d-inline-block px-3 py-2 rounded-3 ${isMine ? 'bg-primary text-white' : 'bg-light'}">
                            ${msg.content}
                        </span>
                    </div>`;
            });
            chatBody.scrollTop = chatBody.scrollHeight;
        } catch (e) {
            console.error(e);
            chatBody.innerHTML = `<p class='text-center text-danger py-5'>Failed to load messages.</p>`;
        }
    }

    function sendChatMessage() {
        const input = document.getElementById("chatInput");
        const text = input.value.trim();
        if (!text || !currentChatReceiver) return;

        fetch('/api/messages', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${localStorage.getItem('token')}`
            },
            body: JSON.stringify({
                receiverId: currentChatReceiver,
                content: text
            })
        })
        .then(() => {
            input.value = "";
            loadChatHistory();
        })
        .catch(() => alert("Failed to send"));
    }

    window.onload = () => {
        loadUserInfo();
        loadConversations();
    };
</script>
</body>
</html>
