<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Register - UIU Friends</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-danger text-white text-center">
                    <h4>👑 Admin Registration</h4>
                    <p>For authorized admins onlyয</p>
                </div>
                <div class="card-body">
                    <form id="adminRegisterForm">
                        <div class="mb-3">
                            <label class="form-label">full name</label>
                            <input type="text" id="adminName" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email (admin@uiu.edu)</label>
                            <input type="email" id="adminEmail" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">phone number</label>
                            <input type="tel" id="adminPhone" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">password</label>
                            <input type="password" id="adminPassword" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-danger w-100">Register as Admin</button>
                    </form>

                    <div class="text-center mt-3">
                        <a href="register.html" class="btn btn-outline-secondary">← Return to User Register</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.getElementById('adminRegisterForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const data = {
            name: document.getElementById('adminName').value,
            email: document.getElementById('adminEmail').value,
            phone: document.getElementById('adminPhone').value,
            password: document.getElementById('adminPassword').value,
            role: "ADMIN"   // Important: Admin role
        };

        try {
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                alert("Admin account created successfully! Please login.");
                window.location.href = "login.html";
            } else {
                const error = await response.text();
                alert("Error: " + error);
            }
        } catch (err) {
            alert("Registration failed. Please try again.");
        }
    });
</script>
</body>
</html>
