<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - UIU Friends</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h4>Login</h4>
                </div>
                <div class="card-body">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" id="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>
                    <p class="text-center mt-3">Don't have an account?<a href="register.html">Register</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/app.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();

        console.log("Trying login with:", email);

        try {
            const response = await fetch("/api/auth/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });

            console.log("Response Status:", response.status);

            if (response.ok) {
                const data = await response.json();
                console.log("🔍 FULL LOGIN RESPONSE:", data);

                localStorage.setItem("token", data.token);

                const role = (data.role || "").toString().toUpperCase().trim();
                console.log("Detected Role:", role);

                if (role === "ADMIN" || role === "ROLE_ADMIN" || role.includes("ADMIN")) {
                    alert("✅ Welcome Admin! Redirecting to Admin Dashboard...");
                    window.location.href = "admin-dashboard.html";
                } else {
                    alert("✅ Login Successful! Welcome to UIU Friends.");
                    window.location.href = "dashboard.html";
                }
            } else {
                const errorText = await response.text();
                console.log("Error Response:", errorText);
                alert("❌ Login Failed: " + (errorText || "Invalid credentials"));
            }
        } catch (error) {
            console.error("Login Error:", error);
            alert("❌ Login failed. Please check your email and password.");
        }
    });
</script>
</body>
</html>
