<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - UIU Friends</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .admin-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .admin-header { background: #1e2937; color: white; padding: 20px; border-radius: 12px; margin-bottom: 25px; }
        .tab-buttons { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { padding: 12px 24px; border: none; background: #e2e8f0; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .tab-btn.active { background: #3b82f6; color: white; }
        .table-container { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8fafc; font-weight: 600; color: #475569; }
        .action-btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; margin: 2px; }
        .approve-btn { background: #10b981; color: white; }
        .reject-btn { background: #ef4444; color: white; }
    </style>
</head>
<body>
<div class="admin-container">
    <div class="admin-header">
        <h1><i class="fas fa-shield-alt"></i> Admin Dashboard - UIU Friends</h1>
        <p>Welcome back, Admin. Manage pending posts and users.</p>
    </div>

    <div class="tab-buttons">
        <button class="tab-btn active" onclick="showTab('loans')">Pending Loans</button>
        <button class="tab-btn" onclick="showTab('crowdfunding')">Pending Crowdfunding</button>
        <button class="tab-btn" onclick="showTab('users')">All Users</button>
    </div>

    <!-- Pending Loans Tab -->
    <div id="loans-tab" class="tab-content">
        <div class="table-container">
            <table>
                <thead>
                <tr>
                    <th>User</th>
                    <th>Amount</th>
                    <th>Repayment</th>
                    <th>Reason</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="loans-body"></tbody>
            </table>
        </div>
    </div>

    <!-- Pending Crowdfunding Tab -->
    <div id="crowdfunding-tab" class="tab-content" style="display:none;">
        <div class="table-container">
            <table>
                <thead>
                <tr>
                    <th>User</th>
                    <th>Title</th>
                    <th>Target Amount</th>
                    <th>Urgent</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="crowdfunding-body"></tbody>
            </table>
        </div>
    </div>

    <!-- Users Tab -->
    <div id="users-tab" class="tab-content" style="display:none;">
        <div class="table-container">
            <table>
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Trust Score</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="users-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>

    // Admin Protection
window.onload = async function() {
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = 'login.html';
        return;
    }

    try {
        const res = await fetch('/api/auth/me', {
            headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!res.ok) throw new Error("Unauthorized");

        const user = await res.json();

        if (!user.role.toUpperCase().includes("ADMIN")) {
            alert("You are not authorized as Admin!");
            window.location.href = 'dashboard.html';
            return;
        }

        // Admin হলে ডেটা লোড করো
        loadData();

    } catch (err) {
        alert("Session expired or unauthorized access.");
        localStorage.removeItem('token');
        window.location.href = 'login.html';
    }
};


    let currentTab = 'loans';

    function showTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
      document.getElementById(tab + '-tab').style.display = 'block';

      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      event.currentTarget.classList.add('active');

      currentTab = tab;
      loadData();
    }

    async function loadData() {
      const token = localStorage.getItem('token');
      if (!token) {
        window.location.href = 'login.html';
        return;
      }

      try {
        if (currentTab === 'loans') {
          const res = await fetch('/api/admin/loans/pending', {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          const loans = await res.json();
          renderLoans(loans);
        }
        else if (currentTab === 'crowdfunding') {
          const res = await fetch('/api/admin/crowdfunding/pending', {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          const campaigns = await res.json();
          renderCrowdfunding(campaigns);
        }
        else if (currentTab === 'users') {
          const res = await fetch('/api/admin/users', {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          const users = await res.json();
          renderUsers(users);
        }
      } catch (error) {
        console.error("Load Data Error:", error);
      }
    }

    function renderLoans(loans) {
      const tbody = document.getElementById('loans-body');
      tbody.innerHTML = '';
      loans.forEach(loan => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${loan.user ? loan.user.name : 'N/A'}</td>
          <td>৳${loan.amount}</td>
          <td>${loan.repaymentTime} days</td>
          <td>${loan.reason ? loan.reason.substring(0, 60) + '...' : 'N/A'}</td>
          <td>
            <button class="action-btn approve-btn" onclick="approveLoan(${loan.id})">Approve</button>
            <button class="action-btn reject-btn" onclick="rejectLoan(${loan.id})">Reject</button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    function renderCrowdfunding(campaigns) {
      const tbody = document.getElementById('crowdfunding-body');
      tbody.innerHTML = '';
      campaigns.forEach(c => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${c.user ? c.user.name : 'N/A'}</td>
          <td>${c.title}</td>
          <td>৳${c.targetAmount}</td>
          <td>${c.isUrgent ? '<span style="color:red">URGENT</span>' : 'Normal'}</td>
          <td>
            <button class="action-btn approve-btn" onclick="approveCrowdfunding(${c.id})">Approve</button>
            <button class="action-btn reject-btn" onclick="rejectCrowdfunding(${c.id})">Reject</button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    function renderUsers(users) {
      const tbody = document.getElementById('users-body');
      tbody.innerHTML = '';
      users.forEach(user => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${user.name}</td>
          <td>${user.email}</td>
          <td>${user.role}</td>
          <td>${user.trustScore}</td>
          <td>${user.active ? 'Active' : 'Banned'}</td>
          <td>
            ${user.active ?
              `<button class="action-btn reject-btn" onclick="banUser(${user.id})">Ban</button>` :
              `<button class="action-btn approve-btn" onclick="unbanUser(${user.id})">Unban</button>`}
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    // Action Functions
    async function approveLoan(id) {
      if (confirm("Approve this loan?")) {
        await fetch(`/api/admin/loans/${id}/approve`, {
          method: 'PUT',
          headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });
        loadData();
      }
    }

    async function rejectLoan(id) {
      if (confirm("Reject this loan?")) {
        await fetch(`/api/admin/loans/${id}/reject`, {
          method: 'PUT',
          headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });
        loadData();
      }
    }

    async function approveCrowdfunding(id) {
      if (confirm("Approve this campaign?")) {
        await fetch(`/api/admin/crowdfunding/${id}/approve`, {
          method: 'PUT',
          headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });
        loadData();
      }
    }

    async function rejectCrowdfunding(id) {
      if (confirm("Reject this campaign?")) {
        await fetch(`/api/admin/crowdfunding/${id}/reject`, {
          method: 'PUT',
          headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });
        loadData();
      }
    }

    async function banUser(id) {
      if (confirm("Ban this user?")) {
        await fetch(`/api/admin/users/${id}/ban`, {
          method: 'PUT',
          headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });
        loadData();
      }
    }

    async function unbanUser(id) {
      if (confirm("Unban this user?")) {
        await fetch(`/api/admin/users/${id}/unban`, {
          method: 'PUT',
          headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });
        loadData();
      }
    }

    // Load data on page load
    window.onload = () => {
      loadData();
    };
</script>
</body>
</html>
