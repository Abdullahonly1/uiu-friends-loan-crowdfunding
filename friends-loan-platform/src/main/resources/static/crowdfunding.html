<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crowdfunding Posts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="dashboard.html">UIU Friends</a>
    </div>
</nav>

<div class="container mt-5">
    <h3 class="mb-4">Crowdfunding Posts</h3>
    <div class="row" id="crowdfundingContainer">
        <!-- Dynamic Load  -->
    </div>
</div>

<script src="js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    async function loadCrowdfunding() {
        try {
            const posts = await apiRequest("/crowdfunding/approved");
            const container = document.getElementById("crowdfundingContainer");
            container.innerHTML = "";

            posts.forEach(post => {
                const progress = (post.currentAmount / post.amountNeeded) * 100;
                const card = `
                    <div class="col-md-6 mb-4">
                        <div class="card h-100">
                            ${post.isUrgent ? '<span class="urgent-badge position-absolute top-0 end-0 m-3">URGENT</span>' : ''}
                            <div class="card-body">
                                <h5>${post.title}</h5>
                                <p>${post.description.substring(0, 120)}...</p>
                                <p><strong>Needed:</strong> ৳ ${post.amountNeeded}</p>
                                <div class="progress mb-2">
                                    <div class="progress-bar" style="width: ${progress}%"></div>
                                </div>
                                <small>${post.currentAmount} / ${post.amountNeeded} The money is raised</small>
                            </div>
                            <div class="card-footer">
                                <button class="btn btn-success w-100" onclick="donate(${post.id})">Donate </button>
                            </div>
                        </div>
                    </div>`;
                container.innerHTML += card;
            });
        } catch (error) {
            console.error(error);
        }
    }

    function donate(id) {
        const amount = prompt("How much money do you want to donate?");
        if (amount) {
            alert(`Donation feature is not yet complete. Will be added at a later stage.\nPost ID: ${id}, Amount: ${amount}`);
        }
    }

    window.onload = loadCrowdfunding;
</script>
</body>
</html>
