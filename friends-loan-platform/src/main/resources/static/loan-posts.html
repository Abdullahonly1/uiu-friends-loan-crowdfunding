<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Posts - UIU Friends</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="dashboard.html">UIU Friends</a>
        <a class="nav-link text-white" href="dashboard.html">Dashboard</a>
    </div>
</nav>

<div class="container mt-5">
    <h3 class="mb-4">All Loan Posts</h3>
    <div class="row" id="loanPostsContainer">
        <!--  dynamically load  -->
    </div>
</div>

<script src="js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    async function loadLoanPosts() {
        try {
            const posts = await apiRequest("/loans/approved");
            const container = document.getElementById("loanPostsContainer");
            container.innerHTML = "";

            posts.forEach(post => {
                const card = `
                    <div class="col-md-6 mb-4">
                        <div class="card h-100">
                            <div class="card-body">
                                <h5 class="card-title">৳ ${post.amount}</h5>
                                <p class="card-text">${post.purpose}</p>
                                <p><strong>Repayment:</strong> ${post.repaymentMonths} Month</p>
                                <p><strong>Status:</strong> <span class="badge bg-success">${post.status}</span></p>
                            </div>
                            <div class="card-footer">
                                <button class="btn btn-sm btn-outline-primary w-100" onclick="makeOffer(${post.id})">
                                    Offer
                                </button>
                            </div>
                        </div>
                    </div>`;
                container.innerHTML += card;
            });
        } catch (error) {
            console.error(error);
        }
    }

    function makeOffer(id) {
        alert("Offer System is not created yet. Will be added at a later stage.");
    }

    window.onload = loadLoanPosts;
</script>
</body>
</html>
