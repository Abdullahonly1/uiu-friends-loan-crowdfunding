<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donate - UIU Friends</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        .hero { background: linear-gradient(135deg, #3b82f6, #1e40af); color: white; padding: 50px 0; }
        .donor-card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="dashboard.html">UIU Friends</a>
        <a href="dashboard.html" class="btn btn-outline-primary"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>
</nav>

<div class="hero text-center">
    <div class="container">
        <h2 id="campaignTitle"></h2>
        <p id="campaignDescription" class="lead"></p>
    </div>
</div>

<div class="container mt-4">
    <div class="row">
        <div class="col-lg-8">
            <!-- Progress -->
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body">
                    <div class="d-flex justify-content-between mb-2">
                        <span class="fw-bold text-success fs-4" id="raisedAmount"></span>
                        <span class="text-muted fs-5" id="goalAmount"></span>
                    </div>
                    <div class="progress" style="height: 14px;">
                        <div class="progress-bar bg-success" id="progressBar"></div>
                    </div>
                    <small class="text-muted" id="percentFunded"></small>
                </div>
            </div>

            <!-- Donors -->
            <h5 class="mb-3">Donors (<span id="donorCount">0</span>)</h5>
            <div id="donorsContainer"></div>
        </div>

        <div class="col-lg-4">
            <div class="card border-0 shadow-sm sticky-top" style="top: 20px;">
                <div class="card-body">
                    <h5>Make a Donation</h5>
                    <input type="number" id="donateAmount" class="form-control form-control-lg mb-3" placeholder="Enter amount">

                    <div class="d-flex flex-wrap gap-2 mb-3">
                        <button class="btn btn-outline-primary" onclick="quickAmount(500)">৳500</button>
                        <button class="btn btn-outline-primary" onclick="quickAmount(1000)">৳1,000</button>
                        <button class="btn btn-outline-primary" onclick="quickAmount(2000)">৳2,000</button>
                        <button class="btn btn-outline-primary" onclick="quickAmount(5000)">৳5,000</button>
                    </div>

                    <textarea id="donateMessage" class="form-control mb-3" rows="3" placeholder="Leave a message of support..."></textarea>

                    <button class="btn btn-success w-100 py-3 fs-5" onclick="submitDonation()">
                        <i class="fas fa-heart"></i> Donate Now
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const postId = urlParams.get('id');

    async function loadCampaign() {
        if (!postId) return window.location.href = "dashboard.html";

        try {
            const post = await apiRequest(`/crowdfunding/${postId}`, "GET");

            document.getElementById('campaignTitle').textContent = post.title;
            document.getElementById('campaignDescription').textContent = post.description;

            const raised = post.currentAmount || 0;
            const goal = post.amountNeeded || 0;
            const progress = goal > 0 ? Math.round((raised / goal) * 100) : 0;

            document.getElementById('raisedAmount').textContent = `৳${raised} raised`;
            document.getElementById('goalAmount').textContent = `Goal ৳${goal}`;
            document.getElementById('progressBar').style.width = `${progress}%`;
            document.getElementById('percentFunded').textContent = `${progress}% funded`;

            loadDonors();
        } catch (e) {
            console.error(e);
            alert("Failed to load campaign");
        }
    }

    async function loadDonors() {
        try {
            const donations = await apiRequest(`/crowdfunding/${postId}/donations`, "GET");
            const container = document.getElementById("donorsContainer");
            container.innerHTML = "";

            document.getElementById("donorCount").textContent = donations.length;

            if (donations.length === 0) {
                container.innerHTML = `<p class="text-muted">No donations yet. Be the first!</p>`;
                return;
            }

            donations.forEach(d => {
                const donorName = d.donor && d.donor.name ? d.donor.name : "Anonymous User";

                const card = document.createElement('div');
                card.className = 'donor-card card mb-3 p-3';
                card.innerHTML = `
                    <div class="d-flex justify-content-between">
                        <div>
                            <strong>${donorName}</strong><br>
                            <small class="text-muted">${new Date(d.donatedAt).toLocaleDateString()}</small>
                        </div>
                        <div class="text-end">
                            <span class="badge bg-success">৳${d.amount}</span>
                        </div>
                    </div>
                    ${d.message ? `<p class="text-muted small mt-2">"${d.message}"</p>` : ''}
                `;
                container.appendChild(card);
            });
        } catch (e) {
            console.error("Failed to load donors", e);
            document.getElementById("donorsContainer").innerHTML = `<p class="text-muted">No donations yet.</p>`;
        }
    }

    function quickAmount(amount) {
        document.getElementById('donateAmount').value = amount;
    }

    async function submitDonation() {
        const amount = parseInt(document.getElementById('donateAmount').value);
        const message = document.getElementById('donateMessage').value.trim();

        if (!amount || amount <= 0) {
            alert("Please enter a valid amount");
            return;
        }

        try {
            await apiRequest(`/crowdfunding/${postId}/donate?amount=${amount}&message=${encodeURIComponent(message)}`, "POST");

            alert(`✅ Thank you! You donated ৳${amount} successfully!`);

            // Refresh to show updated donors and amount
            setTimeout(() => location.reload(), 800);
        } catch (e) {
            alert("Donation failed");
        }
    }

    window.onload = loadCampaign;
</script>
</body>
</html>
